<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>父亲节感恩主题班会</title>
  <style>
    :root {
      --ink: #182033;
      --muted: #637084;
      --line: #d9e1e8;
      --paper: #ffffff;
      --bg: #f5f7f9;
      --accent: #8b4a2b;
      --accent-dark: #5f321d;
      --blue: #2563a8;
      --shadow: 0 18px 50px rgba(20, 31, 45, .14);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, rgba(139, 74, 43, .10), rgba(37, 99, 168, .08)), var(--bg);
    }

    button, select { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
      transition: grid-template-columns .18s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      height: 100vh;
      min-height: 0;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, .93);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .app.sidebar-collapsed .sidebar {
      visibility: hidden;
    }

    .brand {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.28;
      letter-spacing: 0;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .control-group {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(217, 225, 232, .88);
      border-radius: 8px;
      background: #fff;
    }

    .group-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .btn {
      min-height: 38px;
      border: 1px solid rgba(139, 74, 43, .18);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0;
      transition: background .16s ease, border-color .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease;
    }

    .btn.primary {
      border-color: rgba(139, 74, 43, .26);
      background: var(--accent);
      color: #fff;
    }

    .btn:hover {
      border-color: rgba(139, 74, 43, .45);
      background: #fff;
      box-shadow: 0 8px 18px rgba(20, 31, 45, .08);
      transform: translateY(-1px);
    }

    .btn.primary:hover {
      background: var(--accent-dark);
      color: #fff;
    }

    .btn.play {
      min-height: 48px;
      border-color: transparent;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-size: 15px;
      box-shadow: 0 12px 24px rgba(95, 50, 29, .18);
    }

    .btn:active {
      transform: translateY(0);
    }

    .jump {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .print-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      color: var(--ink);
    }

    .counter {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .thumbs {
      overflow: auto;
      padding: 12px;
    }

    .thumb {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 10px;
      width: 100%;
      margin: 0 0 10px;
      padding: 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .thumb.active {
      border-color: rgba(139, 74, 43, .45);
      background: #fff5ef;
    }

    .thumb img {
      width: 54px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #eef2f5;
    }

    .thumb span {
      align-self: center;
      min-width: 0;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .stage {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      height: 100vh;
      min-height: 0;
    }

    .open-sidebar {
      position: absolute;
      z-index: 4;
      top: 10px;
      left: 10px;
      display: none;
      min-height: 36px;
      border: 1px solid rgba(139, 74, 43, .24);
      border-radius: 999px;
      padding: 0 12px;
      color: var(--accent-dark);
      background: rgba(255, 255, 255, .92);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(20, 31, 45, .12);
    }

    .app.sidebar-collapsed .open-sidebar {
      display: inline-flex;
      align-items: center;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 8px 12px;
    }

    .topline strong {
      color: var(--accent-dark);
      font-size: 15px;
    }

    .topline a {
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .viewer-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 0 10px 8px;
    }

    .viewer {
      position: relative;
      width: min(100%, calc((100vh - 68px) * 16 / 9));
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      background: #111827;
      box-shadow: var(--shadow);
    }

    .page-toast {
      position: fixed;
      z-index: 2147483647;
      right: 32px;
      bottom: 32px;
      min-width: 148px;
      border-radius: 999px;
      padding: 16px 24px;
      color: #fff;
      background: rgba(0, 0, 0, .74);
      font-size: clamp(34px, 4vw, 56px);
      font-weight: 900;
      text-align: center;
      opacity: 0;
      transform: translateY(10px) scale(.98);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
      box-shadow: 0 18px 42px rgba(0, 0, 0, .28);
    }

    .page-toast.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .viewer img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111827;
    }

    .load-error {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      color: #fff;
      background: #111827;
      text-align: center;
      line-height: 1.7;
      font-weight: 700;
    }

    .viewer.error .load-error {
      display: grid;
    }

    .nav-hit {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 24%;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .nav-hit.prev { left: 0; }
    .nav-hit.next { right: 0; }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 0 12px 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: rgba(99, 112, 132, .18);
      overflow: hidden;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      transition: width .18s ease;
    }

    .print-pages { display: none; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :fullscreen .app {
      grid-template-columns: 1fr;
      background: #000;
    }

    :fullscreen .sidebar,
    :fullscreen .topline,
    :fullscreen .footer,
    :fullscreen .open-sidebar {
      display: none;
    }

    :fullscreen .stage {
      height: 100vh;
      background: #000;
    }

    :fullscreen .viewer-wrap {
      padding: 0;
    }

    :fullscreen .viewer {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      box-shadow: none;
    }

    :fullscreen .viewer img {
      width: 100vw;
      height: 100vh;
    }

    @media (max-width: 880px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .app.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .sidebar {
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .app.sidebar-collapsed .sidebar {
        display: none;
      }
      .thumbs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 10px 14px 12px;
      }
      .thumb {
        flex: 0 0 154px;
        grid-template-columns: 1fr;
      }
      .thumb img { width: 100%; }
      .stage {
        height: auto;
        min-height: auto;
      }
      .viewer { width: 100%; }
    }

    @media print {
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }
      .app { display: none; }
      .print-pages {
        display: block;
        margin: 0;
        padding: 0;
      }
      .print-pages img {
        display: block;
        margin: 0;
        object-fit: contain;
        object-position: center center;
        break-after: page;
        page-break-after: always;
      }

      .print-pages img:last-child {
        break-after: auto;
        page-break-after: auto;
      }

      body.print-a4,
      body.print-a4 .print-pages img {
        width: 297mm;
        height: 210mm;
      }

      body.print-wide,
      body.print-wide .print-pages img {
        width: 16in;
        height: 9in;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <select class="sr-only" id="slideSelect" aria-label="选择页码"></select>
    <aside class="sidebar" aria-label="课件导航">
      <section class="brand">
        <h1>父亲节感恩主题班会</h1>
        <p>双击本文件即可上课使用。支持方向键翻页、打印和保存课件 PDF。</p>
      </section>

      <section class="toolbar" aria-label="播放控制">
        <button class="btn play" id="startBtn" type="button">开始上课</button>

        <div class="control-group">
          <div class="group-label">翻页</div>
          <div class="btn-row">
            <button class="btn" id="prevBtn" type="button">上页</button>
            <button class="btn primary" id="nextBtn" type="button">下页</button>
          </div>
        </div>

        <div class="control-group">
          <div class="group-label">输出</div>
          <div class="print-row">
            <button class="btn" id="printBtn" type="button">打印课件</button>
            <button class="btn" id="exportBtn" type="button">保存课件PDF</button>
          </div>
        </div>

        <div class="control-group">
          <div class="group-label">视图</div>
          <button class="btn" id="collapseBtn" type="button">隐藏缩略图</button>
        </div>
      </section>

      <nav class="thumbs" id="thumbs" aria-label="缩略图"></nav>
    </aside>

    <section class="stage" aria-label="课件播放区">
      <button class="open-sidebar" id="openSidebarBtn" type="button">展开侧栏</button>
      <header class="topline">
        <strong id="slideLabel">第 1 页</strong>
      </header>

      <div class="viewer-wrap">
        <figure class="viewer" id="viewer">
          <img id="slideImage" src="assets/slides/slide-01.jpg" alt="父亲节感恩主题班会第 1 页">
          <div class="load-error" id="loadError">当前页面图片未能加载。请确认 assets/slides 文件夹与 index.html 放在同一目录下。</div>
          <button class="nav-hit prev" id="hitPrev" type="button" aria-label="上一页"></button>
          <button class="nav-hit next" id="hitNext" type="button" aria-label="下一页"></button>
        </figure>
      </div>

      <footer class="footer">
        <span>← / → 翻页，P 打印</span>
        <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
      </footer>
    </section>
  </main>

  <section class="print-pages" id="printPages" aria-hidden="true"></section>
  <div class="page-toast" id="pageToast" role="status" aria-live="polite">1 / 24</div>

  <script>
    const total = 24;
    const app = document.querySelector(".app");
    const viewer = document.querySelector("#viewer");
    const slideImage = document.querySelector("#slideImage");
    const slideLabel = document.querySelector("#slideLabel");
    const slideSelect = document.querySelector("#slideSelect");
    const counter = document.querySelector("#counter");
    const thumbs = document.querySelector("#thumbs");
    const bar = document.querySelector("#bar");
    const printPages = document.querySelector("#printPages");
    const pageToast = document.querySelector("#pageToast");
    const printPageStyle = document.createElement("style");
    document.head.appendChild(printPageStyle);
    const storageKey = "fatherday-class-meeting-current-slide";
    let toastTimer;
    let current = 1;

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function slideSrc(num) {
      return `assets/slides/slide-${pad(num)}.jpg`;
    }

    function thumbSrc(num) {
      return `assets/thumbs/thumb-${pad(num)}.jpg`;
    }

    function saveCurrentSlide() {
      try {
        localStorage.setItem(storageKey, String(current));
      } catch {}
    }

    function readSavedSlide() {
      try {
        const saved = Number(localStorage.getItem(storageKey));
        return Number.isFinite(saved) && saved >= 1 && saved <= total ? saved : 1;
      } catch {
        return 1;
      }
    }

    function flashPageToast() {
      if (!document.body.contains(pageToast)) {
        document.body.appendChild(pageToast);
      }
      pageToast.textContent = `${current} / ${total}`;
      clearTimeout(toastTimer);
      pageToast.classList.remove("show");
      pageToast.style.cssText = [
        "position: fixed",
        "right: 32px",
        "bottom: 32px",
        "z-index: 2147483647",
        "display: block",
        "visibility: visible",
        "min-width: 148px",
        "padding: 16px 24px",
        "border-radius: 999px",
        "background: rgba(0, 0, 0, .78)",
        "color: #fff",
        "font-size: clamp(34px, 4vw, 56px)",
        "font-weight: 900",
        "line-height: 1",
        "text-align: center",
        "box-shadow: 0 18px 42px rgba(0, 0, 0, .32)",
        "pointer-events: none",
        "opacity: 1",
        "transform: translateY(0) scale(1)",
        "transition: opacity .22s ease, transform .22s ease"
      ].join("; ");
      void pageToast.offsetHeight;
      toastTimer = setTimeout(() => {
        pageToast.style.opacity = "0";
        pageToast.style.transform = "translateY(12px) scale(.96)";
      }, 1000);
    }

    function showSlide(num, options = {}) {
      const { flash = true } = options;
      current = Math.min(total, Math.max(1, num));
      viewer.classList.remove("error");
      slideImage.src = slideSrc(current);
      slideImage.alt = `父亲节感恩主题班会第 ${current} 页`;
      slideLabel.textContent = `第 ${current} 页`;
      counter.textContent = `${current} / ${total}`;
      slideSelect.value = String(current);
      bar.style.width = `${(current / total) * 100}%`;
      saveCurrentSlide();
      if (flash) {
        flashPageToast();
      }
      document.querySelectorAll(".thumb").forEach((button) => {
        button.classList.toggle("active", Number(button.dataset.slide) === current);
      });
      const active = document.querySelector(".thumb.active");
      if (active) {
        thumbs.scrollTop = active.offsetTop - (thumbs.clientHeight - active.offsetHeight) / 2;
        thumbs.scrollLeft = active.offsetLeft - (thumbs.clientWidth - active.offsetWidth) / 2;
      }

      const nextImage = new Image();
      nextImage.src = slideSrc(Math.min(total, current + 1));
    }

    function next() {
      showSlide(current + 1);
    }

    function prev() {
      showSlide(current - 1);
    }

    function startPlay() {
      app.classList.add("sidebar-collapsed");
      document.documentElement.requestFullscreen?.();
    }

    function collapseSidebar() {
      app.classList.add("sidebar-collapsed");
    }

    function openSidebar() {
      app.classList.remove("sidebar-collapsed");
    }

    function setPrintMode(mode) {
      document.body.classList.toggle("print-a4", mode === "a4");
      document.body.classList.toggle("print-wide", mode === "wide");
      printPageStyle.textContent = mode === "wide"
        ? "@page { size: 16in 9in; margin: 0; }"
        : "@page { size: A4 landscape; margin: 0; }";
    }

    function printForPaper() {
      setPrintMode("a4");
      window.print();
    }

    function exportWideDeck() {
      setPrintMode("wide");
      window.print();
    }

    for (let i = 1; i <= total; i += 1) {
      const option = document.createElement("option");
      option.value = String(i);
      option.textContent = `第 ${i} 页`;
      slideSelect.appendChild(option);

      const thumb = document.createElement("button");
      thumb.type = "button";
      thumb.className = "thumb";
      thumb.dataset.slide = String(i);
      thumb.innerHTML = `<img src="${thumbSrc(i)}" alt="第 ${i} 页缩略图"><span>第 ${i} 页</span>`;
      thumb.addEventListener("click", () => showSlide(i));
      thumbs.appendChild(thumb);

      const printImage = document.createElement("img");
      printImage.src = slideSrc(i);
      printImage.alt = `父亲节感恩主题班会第 ${i} 页`;
      printPages.appendChild(printImage);
    }

    slideImage.addEventListener("error", () => viewer.classList.add("error"));
    slideImage.addEventListener("load", () => viewer.classList.remove("error"));

    document.querySelector("#startBtn").addEventListener("click", startPlay);
    document.querySelector("#prevBtn").addEventListener("click", prev);
    document.querySelector("#nextBtn").addEventListener("click", next);
    document.querySelector("#hitPrev").addEventListener("click", prev);
    document.querySelector("#hitNext").addEventListener("click", next);
    document.querySelector("#collapseBtn").addEventListener("click", collapseSidebar);
    document.querySelector("#openSidebarBtn").addEventListener("click", openSidebar);
    document.querySelector("#printBtn").addEventListener("click", printForPaper);
    document.querySelector("#exportBtn").addEventListener("click", exportWideDeck);
    slideSelect.addEventListener("change", () => showSlide(Number(slideSelect.value)));
    viewer.addEventListener("click", (event) => {
      if (event.button !== 0) {
        return;
      }
      event.preventDefault();
      event.stopImmediatePropagation();
      next();
    }, true);
    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) {
        openSidebar();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        next();
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        prev();
      }
      if (event.key.toLowerCase() === "p") {
        printForPaper();
      }
    });

    setPrintMode("a4");
    showSlide(readSavedSlide(), { flash: false });
  </script>
</body>
</html>
